upstream backend_servers {
    ip_hash;
    server backend:3000;
    keepalive 32;
}

# HTTP Server Block - Handles redirect to HTTPS and Certbot challenges
server {
    listen 80;
    server_name thainvbka.id.vn www.thainvbka.id.vn;
    
    # Let's Encrypt ACME challenge directory (used for SSL certificate setup/renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (accessible without SSL for container orchestration)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Health check endpoint for internal API health monitoring (bypasses HTTPS redirect)
    location /api/health {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect all other HTTP traffic to HTTPS (301 Permanent Redirect)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server Block - Serves Frontend and Proxies Backend/WebSockets
server {
    listen 443 ssl;
    http2 on;
    server_name thainvbka.id.vn www.thainvbka.id.vn;

    # SSL Certificate Paths (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/thainvbka.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thainvbka.id.vn/privkey.pem;

    # SSL Protocol & Cipher Optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;

    # Increase client request body size for file uploads (e.g. avatars, court images)
    client_max_body_size 10M;

    # Gzip Compression Setup
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Strict Transport Security (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # API Proxy - Forward /api requests to the backend container
    location /api {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for backend connection
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket Proxy - Forward /socket.io requests (WebSockets for real-time notifications)
    location /socket.io {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeouts are necessary for WebSockets to prevent disconnection
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Frontend Static Assets - Serve compiled React/Vite files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets (JS, CSS, images, fonts)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
