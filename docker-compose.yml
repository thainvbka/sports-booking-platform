services:
  # ---  DATABASE ---
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: sports-booking-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - ./.env
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- REDIS CACHE ---
  redis:
    image: redis:7-alpine
    container_name: sports-booking-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - my-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---  BACKEND 1 ---
  backend-1:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: sports-booking-backend-1
    ports:
      - "3001:3000"
      - "${PRISMA_STUDIO_PORT:-5555}:5555"
    volumes:
      # Bind mount host backend folder to enable hot-reloading
      - ./apps/backend:/app
      - /app/node_modules
    env_file:
      - ./apps/backend/.env
    environment:
      # Override DB and Redis hosts to use Docker container service names
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      CORS_ORIGIN: http://localhost,http://localhost:${CLIENT_PORT:-5173}
      CLIENT_URL: http://localhost:${CLIENT_PORT:-5173}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---  BACKEND 2 ---
  backend-2:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: sports-booking-backend-2
    ports:
      - "3002:3000"
    volumes:
      # Bind mount host backend folder to enable hot-reloading
      - ./apps/backend:/app
      - /app/node_modules
    env_file:
      - ./apps/backend/.env
    environment:
      # Override DB and Redis hosts to use Docker container service names
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      CORS_ORIGIN: http://localhost,http://localhost:${CLIENT_PORT:-5173}
      CLIENT_URL: http://localhost:${CLIENT_PORT:-5173}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - my-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- LOCAL LOAD BALANCER / GATEWAY (Tương đương Nginx trong container frontend ở Production) ---
  nginx-dev:
    image: nginx:alpine
    container_name: sports-booking-nginx-dev
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    networks:
      - my-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---  FRONTEND ---
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: sports-booking-frontend
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    volumes:
      # Bind mount host frontend folder for hot-reloading
      - ./apps/frontend:/app
      - /app/node_modules
    env_file:
      - ./apps/frontend/.env
    networks:
      - my-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---  DOZZLE LOG VIEWER ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: sports-booking-log-viewer
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - my-network

volumes:
  postgres-data:
  redis-data:

networks:
  my-network:
    driver: bridge
