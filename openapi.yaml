      description: Notifies backend to release pending bookings since player aborted checkout.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - booking_ids
              properties:
                booking_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Booking cancellation processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /payments/webhook:
    post:
      summary: Raw Stripe event webhook receiver
      description: Mounts on root `/api/v1/payments/webhook` with raw request body parser.
      responses:
        "200":
          description: Handled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/payouts/owner/wallet:
    get:
      summary: Get owner wallet details
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wallet history retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/payouts/owner/bank-details:
    post:
      summary: Update owner bank details
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOwnerBankDetailsInput"
      responses:
        "200":
          description: Bank details updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/payouts/owner/payout-request:
    post:
      summary: Send payout request (Owner)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Payout request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/payouts/admin:
    get:
      summary: Get payout batches (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/PayoutStatus"
      responses:
        "200":
          description: Payout batches retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/payouts/admin/wallets:
    get:
      summary: View owner wallets (Admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wallets retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/payouts/admin/{batchId}/process:
    post:
      summary: Mark payout batch as processing
      security:
        - bearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Batch status updated to PROCESSING
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/payouts/admin/{batchId}/approve:
    post:
      summary: Approve payout batch
      security:
        - bearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transaction_ref
              properties:
                transaction_ref:
                  type: string
                  example: "TXN123456789"
                note:
                  type: string
                  example: "Completed bank transfer manually"
      responses:
        "200":
          description: Payout batch approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/payouts/admin/{batchId}/cancel:
    post:
      summary: Cancel payout batch
      security:
        - bearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  example: "Rejected due to incorrect bank account details"
      responses:
        "200":
          description: Batch canceled and payouts reverted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/owner-dashboard/stats-metrics:
    get:
      summary: Get owner dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/notifications:
    get:
      summary: Get notifications
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: type
          in: query
          schema:
            type: string
            enum: [BOOKING, MATCH, PAYMENT, SYSTEM]
        - name: target_role
          in: query
          schema:
            type: string
            enum: [PLAYER, OWNER, ADMIN]
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/notifications/unread-count:
    get:
      summary: Get unread count
      security:
        - bearerAuth: []
      parameters:
        - name: target_role
          in: query
          schema:
            type: string
            enum: [PLAYER, OWNER, ADMIN]
      responses:
        "200":
          description: Count returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/notifications/{id}/read:
    patch:
      summary: Mark notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification status marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/notifications/read-all:
    patch:
      summary: Mark all notifications read
      security:
        - bearerAuth: []
      parameters:
        - name: target_role
          in: query
          schema:
            type: string
            enum: [PLAYER, OWNER, ADMIN]
      responses:
        "200":
          description: All notifications marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/reviews:
    post:
      summary: Create review (Player)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - booking_id
                - rating
              properties:
                booking_id:
                  type: string
                  format: uuid
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Max 5 images
      responses:
        "201":
          description: Review created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/reviews/{id}:
    patch:
      summary: Update review (Player)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Max 5 images
      responses:
        "200":
          description: Review updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      summary: Delete review (Player)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Review deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/reviews/owner/{id}:
    delete:
      summary: Delete review (Owner)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Review deleted by owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/recommendations:
    get:
      summary: Get recommendations (Player)
      description: Get AI recommended subfields tailored for Player sports interest.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recommendations retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SportType:
      type: string
      enum: [FOOTBALL, BASKETBALL, TENNIS, BADMINTON, VOLLEYBALL, PICKLEBALL]
      example: "FOOTBALL"

    BookingStatus:
      type: string
      enum: [PENDING, CONFIRMED, CANCELED, COMPLETED]
      example: "PENDING"

    ComplexStatus:
      type: string
      enum: [DRAFT, PENDING, ACTIVE, REJECTED, INACTIVE]
      example: "PENDING"

    PayoutStatus:
      type: string
      enum: [PENDING, REQUESTED, PROCESSING, PAID, CANCELLED]
      example: "PENDING"

    MatchStatus:
      type: string
      enum: [OPEN, FULL, CLOSED, EXPIRED, CANCELED, COMPLETED]
      example: "OPEN"

    MatchSkillLevel:
      type: string
      enum: [BEGINNER, INTERMEDIATE, ADVANCED]
      example: "INTERMEDIATE"

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        status:
          type: integer
          example: 200
        code:
          type: integer
          example: 200
        message:
          type: string
          example: "Operation completed successfully"
        reason:
          type: string
          example: "OK"
        data:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        status:
          type: integer
          example: 400
        code:
          type: integer
          example: 400
        reason:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Error message details"

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        status:
          type: integer
          example: 400
        code:
          type: integer
          example: 400
        reason:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Invalid input data"
        errors:
          type: array
          items:
            type: object
            properties:
              path:
                type: array
                items:
                  type: string
                example: ["body", "email"]
              message:
                type: string
                example: "Email không hợp lệ"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        phone_number:
          type: string
        avatar:
          type: string
          nullable: true
        email_verified:
          type: boolean
        roles:
          type: array
          items:
            type: string
          example: ["PLAYER"]

    RegisterInput:
      type: object
      required:
        - email
        - password
        - full_name
        - phone_number
        - role
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          example: "password123"
        full_name:
          type: string
          minLength: 5
          example: "Nguyen Van A"
        phone_number:
          type: string
          minLength: 10
          example: "0987654321"
        role:
          type: string
          enum: [PLAYER, OWNER, ADMIN]
          example: "PLAYER"
        company_name:
          type: string
          description: Required if role is OWNER
          example: "Công ty Cổ phần Sân cỏ BK"

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          example: "password123"

    ForgotPasswordInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"

    ResetPasswordInput:
      type: object
      required:
        - new_password
      properties:
        new_password:
          type: string
          minLength: 8
          example: "newpassword123"

    AddRoleInput:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [PLAYER, OWNER]
          example: "OWNER"
        company_name:
          type: string
          example: "BK Sports Complex"

    UpdateComplexInput:
      type: object
      properties:
        complex_name:
          type: string
          minLength: 3
          maxLength: 100
          example: "BK Sports Ground Updated"
        complex_address:
          type: string
          minLength: 10
          maxLength: 500
          example: "Số 2 Đại Cồ Việt, Hai Bà Trưng, Hà Nội"

    UpdateSubfieldInput:
      type: object
      properties:
        subfield_name:
          type: string
          minLength: 3
          maxLength: 100
          example: "Sân 5 vip 1"
        capacity:
          type: integer
          minimum: 1
          maximum: 30
          example: 10
        sport_type:
          $ref: "#/components/schemas/SportType"

    CreatePricingRuleInput:
      type: object
      required:
        - sub_field_id
        - day_of_week
        - time_slots
      properties:
        sub_field_id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        day_of_week:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 6
          example: [1, 2, 3, 4, 5]
        time_slots:
          type: array
          items:
            type: object
            required:
              - start_time
              - end_time
              - base_price
            properties:
              start_time:
                type: string
                pattern: "^([0-1]\\d|2[0-3]):([0-5]\\d)$"
                example: "17:00"
              end_time:
                type: string
                pattern: "^([0-1]\\d|2[0-3]):([0-5]\\d)$"
                example: "18:30"
              base_price:
                type: number
                minimum: 0
                example: 150000

    UpdatePricingRuleInput:
      type: object
      required:
        - sub_field_id
      properties:
        sub_field_id:
          type: string
          format: uuid
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
        start_time:
          type: string
          pattern: "^([0-1]\\d|2[0-3]):([0-5]\\d)$"
          example: "18:00"
        end_time:
          type: string
          pattern: "^([0-1]\\d|2[0-3]):([0-5]\\d)$"
          example: "19:30"
        base_price:
          type: number
          minimum: 0
          example: 160000

    CopyPricingRuleInput:
      type: object
      required:
        - sub_field_id
        - source_day
        - target_days
      properties:
        sub_field_id:
          type: string
          format: uuid
        source_day:
          type: integer
          minimum: 0
          maximum: 6
          example: 1
        target_days:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 6
          example: [2, 3, 4, 5]

    CreateBookingInput:
      type: object
      required:
        - start_time
        - end_time
      properties:
        start_time:
          type: string
          format: date-time
          example: "2026-07-02T17:00:00.000Z"
        end_time:
          type: string
          format: date-time
          example: "2026-07-02T18:30:00.000Z"
        addons:
          type: array
          items:
            type: object
            required:
              - product_id
              - quantity
            properties:
              product_id:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1
          example: []

    CreateRecurringBookingInput:
      type: object
      required:
        - start_time
        - end_time
        - start_date
        - end_date
        - recurrence_type
      properties:
        start_time:
          type: string
          format: date-time
          example: "2026-07-02T17:00:00.000Z"
        end_time:
          type: string
          format: date-time
          example: "2026-07-02T18:30:00.000Z"
        start_date:
          type: string
          format: date-time
          example: "2026-07-02T00:00:00.000Z"
        end_date:
          type: string
          format: date-time
          example: "2026-08-02T00:00:00.000Z"
        recurrence_type:
          type: string
          enum: [WEEKLY, MONTHLY]
          example: "WEEKLY"
        type:
          type: string
          enum: [ONE_TIME, RECURRING]
          example: "RECURRING"

    CreateMatchInput:
      type: object
      required:
        - booking_id
        - title
        - slots_needed
      properties:
        booking_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 5
          maxLength: 200
          example: "Tìm đối giao lưu bóng đá sân BK"
        description:
          type: string
          maxLength: 1000
          example: "Cần tìm thêm 2-3 bạn đá giao lưu vui vẻ, sân đã đặt sẵn"
        slots_needed:
          type: integer
          minimum: 1
          maximum: 30
          example: 3
        skill_level:
          $ref: "#/components/schemas/MatchSkillLevel"
        join_deadline:
          type: string
          format: date-time

    JoinMatchInput:
      type: object
      properties:
        introduction:
          type: string
          maxLength: 1000
          example: "Mình chơi tiền đạo, đá phủi được 2 năm"

    UpdateProductStockInput:
      type: object
      required:
        - increment
      properties:
        increment:
          type: integer
          minimum: 1
          example: 10

    UpdateOwnerBankDetailsInput:
      type: object
      required:
        - bank_name
        - bank_account_number
        - bank_account_name
      properties:
        bank_name:
          type: string
          example: "Vietcombank"
        bank_account_number:
          type: string
          example: "0011001234567"
        bank_account_name:
          type: string
          example: "NGUYEN VAN A"
        bank_branch:
          type: string
          example: "Chi nhánh Hà Nội"
