openapi: 3.0.3
info:
  title: Sports Booking Platform API
  description: OpenAPI 3.0 specification for the Sports Booking Platform backend APIs.
  version: 1.0.0
servers:
  - url: /api
    description: Local Server
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns health status of the API service
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            example: ok
                          timestamp:
                            type: string
                            format: date-time
                            example: "2026-07-02T11:28:12Z"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1:
    get:
      summary: API V1 Root Ping
      description: Public ping endpoint to check if API v1 is active.
      responses:
        "200":
          description: API V1 running
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "API v1 is running"

  /v1/public/complexes:
    get:
      summary: Get active complexes
      description: Retrieve paginated list of active complexes with optional search, sport type, and price filters.
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Limit items per page
          schema:
            type: integer
            default: 8
        - name: search
          in: query
          description: Search term for complex name or address
          schema:
            type: string
        - name: sport_types
          in: query
          description: Filter complexes by sport types
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/SportType"
        - name: minPrice
          in: query
          description: Minimum price filter
          schema:
            type: integer
        - name: maxPrice
          in: query
          description: Maximum price filter
          schema:
            type: integer
      responses:
        "200":
          description: Complexes retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/public/complexes/{id}:
    get:
      summary: Get public complex by ID
      description: Get public detailed information of a complex by its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Complex ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number for paginating subfields
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Limit items per page for subfields
          schema:
            type: integer
            default: 8
        - name: search
          in: query
          description: Search term for subfields
          schema:
            type: string
      responses:
        "200":
          description: Complex retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Complex not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/public/subfields:
    get:
      summary: Get all public subfields
      description: Retrieve public subfields list with filters and search query.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 8
        - name: search
          in: query
          schema:
            type: string
        - name: sport_types
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: "#/components/schemas/SportType"
        - name: minCapacity
          in: query
          schema:
            type: integer
        - name: maxCapacity
          in: query
          schema:
            type: integer
        - name: minPrice
          in: query
          schema:
            type: integer
        - name: maxPrice
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Subfields retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/public/subfields/{id}:
    get:
      summary: Get public subfield by ID
      description: Get details of a public subfield by its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Subfield ID
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Subfield detail retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Subfield not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/public/subfields/{id}/availability:
    get:
      summary: Get subfield availability
      description: Check subfield's booking availability slots on a specific date.
      parameters:
        - name: id
          in: path
          required: true
          description: Subfield ID
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          description: Booking date in format YYYY-MM-DD
          schema:
            type: string
            format: date
          example: "2026-07-02"
      responses:
        "200":
          description: Availability slots retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Missing date parameter or invalid format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/public/subfields/{id}/reviews:
    get:
      summary: Get subfield reviews
      description: Get reviews for a subfield.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: rating
          in: query
          schema:
            type: integer
        - name: has_images
          in: query
          schema:
            type: boolean
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [newest, oldest, rating_desc, rating_asc]
            default: newest
      responses:
        "200":
          description: Reviews retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/public/matches:
    get:
      summary: Get public matches list
      description: Search public matches looking for participants.
      parameters:
        - name: sport_type
          in: query
          schema:
            $ref: "#/components/schemas/SportType"
        - name: skill_level
          in: query
          schema:
            $ref: "#/components/schemas/MatchSkillLevel"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/MatchStatus"
        - name: from_time
          in: query
          schema:
            type: string
            format: date-time
        - name: to_time
          in: query
          schema:
            type: string
            format: date-time
        - name: complex_id
          in: query
          schema:
            type: string
            format: uuid
        - name: sub_field_id
          in: query
          schema:
            type: string
            format: uuid
        - name: province
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [start_time:asc, start_time:desc, created_at:desc]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Matches retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/public/matches/{id}:
    get:
      summary: Get public match by ID
      description: Retrieve public match details by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Match retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/auth/signup:
    post:
      summary: User registration
      description: Register a new account as PLAYER, OWNER or ADMIN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          needVerify:
                            type: boolean
                            example: true
        "400":
          description: Validation error or account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /v1/auth/verify-email/{token}:
    post:
      summary: Verify email address
      description: Verify email using verification token sent during signup.
      parameters:
        - name: token
          in: path
          required: true
          description: Email verification token
          schema:
            type: string
      responses:
        "200":
          description: Email verified successfully, sets refresh token cookie
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
                          accessToken:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/login:
    post:
      summary: User login
      description: Login with email and password to receive JWT credentials.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in successfully, sets refresh token cookie
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
                          accessToken:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: Invalid validation fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/refresh-token:
    post:
      summary: Refresh access token
      description: Request a new access token using the HttpOnly refresh token cookie.
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "401":
          description: No refresh token provided or revoked/expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/logout:
    post:
      summary: User logout
      description: Logout current session by revoking the refresh token.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/forgot-password:
    post:
      summary: Request password reset link
      description: Sends a password reset verification link to the provided email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Link sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/auth/reset-password/{token}:
    put:
      summary: Reset password
      description: Set a new password using the reset password token.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid token or parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /v1/auth/me:
    get:
      summary: Get current authenticated user details
      description: Fetch authenticated account profiles info.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User details retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"

  /v1/account/roles:
    post:
      summary: Add new role to account
      description: Request addition of PLAYER or OWNER role to current authenticated account.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRoleInput"
      responses:
        "200":
          description: Role added successfully, returns updated JWT metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
                          accessToken:
                            type: string

  /v1/account/profile:
    put:
      summary: Update user profile
      description: Update profile fields like full_name, phone_number, and upload avatar.
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                phone_number:
                  type: string
                company_name:
                  type: string
                  description: Required if role includes OWNER
                avatar:
                  type: string
                  format: binary
                  description: Profile avatar image file
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/admin/analytics:
    get:
      summary: Get platform analytics
      description: Retrieve admin dashboard analytics metrics.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/admin/users:
    get:
      summary: Get platform users list
      description: Retrieve paginated, filterable list of all registered platform users.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [PLAYER, OWNER, ADMIN]
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users list retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/admin/users/{id}/status:
    patch:
      summary: Update user account status
      description: Block/activate user access status.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
                - status
              properties:
                role:
                  type: string
                  enum: [PLAYER, OWNER, ADMIN]
                status:
                  type: string
                  example: "BANNED"
      responses:
        "200":
          description: Status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/admin/complexes:
    get:
      summary: Get admin complexes list
      description: Retrieve complexes list for review and monitoring.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ComplexStatus"
      responses:
        "200":
          description: Complexes list retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/admin/complexes/{id}/status:
    patch:
      summary: Update complex status
      description: Approve (ACTIVE) or reject/deactivate complex status.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: "#/components/schemas/ComplexStatus"
      responses:
        "200":
          description: Complex status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/admin/bookings:
    get:
      summary: Monitor bookings
      description: Retrieve platform-wide booking list for monitoring.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Bookings retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/admin/bookings/recurring:
    get:
      summary: Monitor recurring bookings
      description: Monitor recurring booking schedules.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Recurring bookings retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/admin/payments:
    get:
      summary: Get platform transactions
      description: Retrieve history of payments made in the system.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Transactions retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/complexes:
    post:
      summary: Register complex (Owner)
      description: Submit details for registration of a new sports complex, pending approval from admin.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - complex_name
                - complex_address
                - complex_image
                - verification_docs
              properties:
                complex_name:
                  type: string
                  example: "Sân bóng cỏ nhân tạo Đại học Bách Khoa"
                complex_address:
                  type: string
                  example: "Số 1 Đại Cồ Việt, Hai Bà Trưng, Hà Nội"
                complex_image:
                  type: string
                  format: binary
                  description: Front image of complex
                verification_docs:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Legal documents, license etc.
      responses:
        "201":
          description: Complex created and pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    get:
      summary: Owner complexes list
      description: Get active complexes owned by currently authenticated Owner profile.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Owner complexes retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/complexes/{id}:
    get:
      summary: Owner get complex by ID
      description: Get complex detail by ID.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Complex detail retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    patch:
      summary: Update complex details
      description: Update complex name or address details.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComplexInput"
      responses:
        "200":
          description: Complex updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      summary: Delete complex
      description: Soft deletes the complex.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Complex deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/complexes/{id}/sub-fields:
    post:
      summary: Add subfield to complex
      description: Create a subfield (court) under the specified complex ID.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Complex ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - subfield_name
                - capacity
                - sport_type
                - subfield_image
              properties:
                subfield_name:
                  type: string
                  example: "Sân 5 số 1"
                capacity:
                  type: integer
                  example: 10
                sport_type:
                  $ref: "#/components/schemas/SportType"
                subfield_image:
                  type: string
                  format: binary
      responses:
        "201":
          description: Subfield created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /v1/complexes/{id}/reactivate:
    post:
