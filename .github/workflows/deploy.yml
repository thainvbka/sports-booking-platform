name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "docker-compose.prod.yml"
      - "nginx/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/sports-booking-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/sports-booking-frontend

jobs:
  # ============================================
  # JOB 1: BUILD trên máy GitHub
  # ============================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Build completed
        run: |
          echo "Images built and pushed to Docker Hub:"
          echo "Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:latest"

  # ============================================
  # JOB 2: DEPLOY lên EC2
  # ============================================
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${EC2_HOST} "IMAGE_TAG='${IMAGE_TAG}' BACKEND_IMAGE='${BACKEND_IMAGE}' FRONTEND_IMAGE='${FRONTEND_IMAGE}' bash -s" << 'EOF'
            cd ~/sports-booking-platform || exit 1
            
            # Check if .env.production exists
            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found!"
              echo "Please create .env.production file on EC2"
              exit 1
            fi

            # Export image tag for this release (pinned by commit SHA)
            # Pull latest code
            git pull origin main
            
            # Pull latest images từ Docker Hub (KHÔNG BUILD!)
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            
            # Start/replace containers with latest image tag
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
            
            # Wait for services
            sleep 15
            
            # Run migrations inside backend container
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend sh -c "cd /app && npx prisma migrate deploy --schema=./apps/backend/prisma/schema.prisma"

            # Quick health checks
            docker compose -f docker-compose.prod.yml --env-file .env.production ps
            curl -f http://localhost/api/health >/dev/null
            
            # Clean up old images
            docker image prune -af --filter "until=24h"
          EOF

      - name: Deployment completed
        run: |
          echo "Deployment to EC2 completed successfully!"
          echo "Application URL: http://${{ secrets.EC2_HOST }}"
