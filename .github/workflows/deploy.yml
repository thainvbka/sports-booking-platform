name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "docker-compose.prod.yml"
      - "nginx/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/sports-booking-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/sports-booking-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ============================================
  # JOB 1: Build & Push Images to Docker Hub
  # ============================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Build completed
        run: |
          echo "Images successfully built and pushed to Docker Hub:"
          echo "Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:latest"

  # ============================================
  # JOB 2: Deploy to AWS EC2 Instance
  # ============================================
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy Config Files to EC2 (No Git configuration needed on EC2)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          # Ensure target directory exists on EC2
          ssh -o StrictHostKeyChecking=no ubuntu@${EC2_HOST} "mkdir -p ~/sports-booking-platform"
          
          # Copy compose files and Nginx configs directly to the EC2 server
          scp -o StrictHostKeyChecking=no docker-compose.prod.yml ubuntu@${EC2_HOST}:~/sports-booking-platform/
          scp -o StrictHostKeyChecking=no -r nginx ubuntu@${EC2_HOST}:~/sports-booking-platform/

      - name: Execute Deploy Commands on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${EC2_HOST} "IMAGE_TAG='${IMAGE_TAG}' BACKEND_IMAGE='${BACKEND_IMAGE}' FRONTEND_IMAGE='${FRONTEND_IMAGE}' bash -s" << 'EOF'
            cd ~/sports-booking-platform || exit 1
            
            # Check if .env.production exists on EC2 (required for production credentials)
            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found in ~/sports-booking-platform!"
              echo "Please SSH to your EC2 instance and create ~/sports-booking-platform/.env.production"
              exit 1
            fi

            echo "::::: Pulling latest images from Docker Hub..."
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            
            echo "::::: Starting database and cache services..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d postgres-db redis
            
            echo "::::: Waiting for database to be healthy..."
            for i in {1..30}; do
              STATUS=$(docker inspect --format='{{json .State.Health.Status}}' sports-booking-db 2>/dev/null || echo "")
              if [ "$STATUS" = "\"healthy\"" ]; then
                echo "::::: Database is healthy!"
                break
              fi
              echo "::::: Database health status: $STATUS, waiting... ($i/30)"
              sleep 2
            done
            
            echo "::::: Running database migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env.production run -T --rm backend npx prisma migrate deploy < /dev/null
            
            echo "::::: Starting backend services (scale=2)..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans backend
            
            echo "::::: Waiting for all backend replicas to be healthy..."
            for i in {1..40}; do
              ALL_HEALTHY=true
              CONTAINERS=$(docker compose -f docker-compose.prod.yml --env-file .env.production ps backend -q)
              
              if [ -z "$CONTAINERS" ]; then
                echo "::::: No backend containers found yet..."
                ALL_HEALTHY=false
              else
                for CONTAINER in $CONTAINERS; do
                  STATUS=$(docker inspect --format='{{json .State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo "")
                  STATE=$(docker inspect --format='{{json .State.Status}}' "$CONTAINER" 2>/dev/null || echo "")
                  
                  if [ "$STATE" = "\"exited\"" ]; then
                    echo "ERROR: Backend container $CONTAINER has exited/crashed!"
                    docker compose -f docker-compose.prod.yml --env-file .env.production logs backend
                    exit 1
                  fi
                  
                  if [ "$STATUS" != "\"healthy\"" ]; then
                    ALL_HEALTHY=false
                  fi
                done
              fi
              
              if [ "$ALL_HEALTHY" = true ] && [ -n "$CONTAINERS" ]; then
                echo "::::: All backend replicas are healthy!"
                break
              fi
              
              echo "::::: Waiting for all backend replicas to be healthy ($i/40)..."
              sleep 3
            done
            
            echo "::::: Starting and recreating frontend service (Nginx) to refresh load balancer upstreams..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --force-recreate frontend
            
            echo "::::: Starting log viewer service (Dozzle)..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d dozzle
            
            echo "::::: Running final health checks..."
            docker compose -f docker-compose.prod.yml --env-file .env.production ps
            
            curl -sf http://localhost/api/health || {
              echo "Final backend health check failed!"
              echo "::::: Printing backend logs for debugging..."
              docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail=100 backend
              exit 1
            }
            
            curl -sf http://localhost/health || {
              echo "Final frontend health check failed!"
              echo "::::: Printing frontend logs for debugging..."
              docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail=100 frontend
              exit 1
            }
            
            echo "::::: Cleaning up old Docker images to save space..."
            docker image prune -af --filter "until=24h"
            
            echo "::::: Deployment completed successfully!"
          EOF

      - name: Log Deployment Success
        run: |
          echo "Deployment to EC2 completed successfully!"
          echo "Public Domain: https://thainvbka.id.vn"
          echo "Application IP: http://${{ secrets.EC2_HOST }}"
